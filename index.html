<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>じゃんけん</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #f0f4ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 360px;
    }
    h1 { font-size: 28px; margin-bottom: 32px; }
    .hands {
      display: flex;
      justify-content: space-around;
      margin-bottom: 32px;
    }
    .hand-btn {
      font-size: 48px;
      background: none;
      border: 3px solid #ddd;
      border-radius: 12px;
      width: 90px;
      height: 90px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .hand-btn:hover {
      border-color: #6c8fff;
      background: #f0f4ff;
      transform: scale(1.1);
    }
    .battle {
      font-size: 64px;
      margin-bottom: 16px;
      min-height: 80px;
    }
    .result {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 24px;
      min-height: 36px;
    }
    .result.win  { color: #2ecc71; }
    .result.lose { color: #e74c3c; }
    .result.draw { color: #f39c12; }
    .score {
      display: flex;
      justify-content: space-around;
      background: #f8f9ff;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      color: #555;
    }
    .score span { font-size: 22px; font-weight: bold; color: #333; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>じゃんけん ✊</h1>
    <div class="hands">
      <button class="hand-btn" onclick="play('rock')"    title="グー">✊</button>
      <button class="hand-btn" onclick="play('scissors')" title="チョキ">✌️</button>
      <button class="hand-btn" onclick="play('paper')"   title="パー">🖐️</button>
    </div>
    <div class="battle" id="battle">　</div>
    <div class="result" id="result">上のボタンを押してね！</div>
    <div class="score">
      <div>勝ち<span id="win">0</span></div>
      <div>負け<span id="lose">0</span></div>
      <div>引き分け<span id="draw">0</span></div>
    </div>
  </div>

  <script>
    const emoji = { rock: '✊', scissors: '✌️', paper: '🖐️' };
    const label = { rock: 'グー', scissors: 'チョキ', paper: 'パー' };
    const beats = { rock: 'scissors', scissors: 'paper', paper: 'rock' };
    const score = { win: 0, lose: 0, draw: 0 };

    function play(player) {
      const choices = ['rock', 'scissors', 'paper'];
      const cpu = choices[Math.floor(Math.random() * 3)];

      document.getElementById('battle').textContent = emoji[player] + '  vs  ' + emoji[cpu];

      const resultEl = document.getElementById('result');
      if (player === cpu) {
        resultEl.textContent = '引き分け！';
        resultEl.className = 'result draw';
        score.draw++;
      } else if (beats[player] === cpu) {
        resultEl.textContent = 'あなたの勝ち！ 🎉';
        resultEl.className = 'result win';
        score.win++;
      } else {
        resultEl.textContent = 'あなたの負け… 😢';
        resultEl.className = 'result lose';
        score.lose++;
      }

      document.getElementById('win').textContent  = score.win;
      document.getElementById('lose').textContent = score.lose;
      document.getElementById('draw').textContent = score.draw;
    }
  </script>
</body>
</html>
